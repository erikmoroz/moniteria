<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<title>Denarly</title>
</head>
<body style="margin:0;padding:0;background-color:#f3f4f6;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;">
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f3f4f6;padding:32px 0;">
<tr>
<td align="center">
<table role="presentation" width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;">

<tr>
<td style="padding:24px;text-align:center;">
<span style="font-size:24px;font-weight:700;color:#111827;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;">Denarly</span>
</td>
</tr>

{% block preheader %}{% endblock %}

<tr>
<td style="background-color:#ffffff;border-radius:8px;padding:24px;">
{% block content %}{% endblock %}

{% block cta_url %}
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="margin-top:24px;">
<tr>
<td align="center">
<a href="{{ cta_url }}" style="display:inline-block;background-color:#2563eb;color:#ffffff;text-decoration:none;border-radius:8px;padding:16px 32px;font-size:16px;font-weight:600;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;">{% block cta_text %}{% endblock %}</a>
</td>
</tr>
</table>
{% endblock %}
</td>
</tr>

<tr>
<td style="padding:24px 24px 0;text-align:center;">
<p style="margin:0;font-size:13px;color:#6b7280;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;">You're receiving this because you have a Denarly account.</p>
</td>
</tr>

</table>
</td>
</tr>
</table>
</body>
</html>
