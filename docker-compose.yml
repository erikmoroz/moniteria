services:
  moniteria_db:
    image: postgres:17-alpine
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "5432:5432"
    networks:
      - moniteria-network

  moniteria_redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - moniteria-network
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  moniteria_api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: moniteria_api
    env_file:
      - .env
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - DEBUG=${DEBUG:-false}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - REDIS_URL=redis://moniteria_redis:6379
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    networks:
      - moniteria-network
    depends_on:
      - moniteria_db
      - moniteria_redis

  moniteria_ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8000/api
    env_file:
      - .env
    ports:
      - "3000:80"
    networks:
      - moniteria-network
    depends_on:
      - moniteria_api

volumes:
  postgres_data:
  redis_data:

networks:
  moniteria-network:
    driver: bridge
